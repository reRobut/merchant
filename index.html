<!doctype html>
<html lang="zh">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Merchant</title>
	<link
		href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Serif+SC:wght@300;400;500;700&family=IM+Fell+English+SC&display=swap"
		rel="stylesheet" />
	<link rel="stylesheet" href="style.css">
</head>

<body>
	<div id="screen-title" class="screen active">
		<div class="title-deco">
			<div class="game-title-cn" id="t-title-cn"></div>
			<div class="game-title-en">MERCHANT</div>
		</div>
		<div class="title-ornament" id="t-ornament"></div>
		<div class="menu-list">
			<button class="menu-btn" onclick="showNewGame()" id="t-new-game"></button>
			<button class="menu-btn" onclick="document.getElementById('save-file-input').click()"
				id="t-load-game"></button>
			<div class="lang-inline-row">
				<button class="lang-inline-btn active" id="lang-btn-zh" onclick="chooseLang('zh')">中文</button>
				<span class="lang-divider">·</span>
				<button class="lang-inline-btn" id="lang-btn-en" onclick="chooseLang('en')">English</button>
			</div>
		</div>
		<input type="file" id="save-file-input" accept=".json" onchange="loadSaveFile(event)" />
		<div class="version-tag">v1.0 · by Robut 纯一星鸣</div>
		<div class="version-tag">QQ群：212272061 | robut.game@gmail.com</div>
	</div>

	<div id="screen-newgame" class="screen">
		<button class="btn-back" id="btn-back-newgame" onclick="showScreen('title')"></button>
		<div class="panel">
			<div class="panel-title" id="ng-title"></div>
			<div class="field-group">
				<label class="field-label" id="ng-name-label"></label>
				<input type="text" class="game-input" id="char-name" placeholder="请输入角色名..." maxlength="12" />
			</div>
			<div class="field-group">
				<label class="field-label" id="ng-country-label"></label>
				<div class="country-grid" id="country-grid"></div>
			</div>
			<button class="btn-primary" onclick="startGame()" id="ng-start"></button>
		</div>
	</div>

	<div id="screen-game" class="screen" style="flex-direction: column">
		<div class="topbar">
			<div class="topbar-city" id="city-name">—</div>
			<div class="topbar-stats">
				<div class="stat-item">💰 <span class="stat-val gold" id="stat-gold">—</span></div>
				<div class="stat-item"><span class="stat-val" id="stat-day">第1天</span></div>
				<div class="stat-item"><span class="stat-val" id="stat-rep">声誉: 0</span></div>
				<div class="stat-item">📦 <span class="stat-val" id="stat-cargo">0/10</span></div>
			</div>
			<div class="topbar-right">
				<button class="btn-sm" id="btn-travel" onclick="openTravel()"></button>
				<button class="btn-sm" id="btn-save" onclick="saveGame()"></button>
			</div>
		</div>

		<div class="tabs">
			<button class="tab active" onclick="switchTab('buy')" id="tab-buy"></button>
			<button class="tab" onclick="switchTab('inventory')" id="tab-inv"></button>
			<button class="tab" onclick="switchTab('weapon')" id="tab-weapon"></button>
			<button class="tab" onclick="switchTab('armor')" id="tab-armor"></button>
			<button class="tab" onclick="switchTab('transport')" id="tab-transport"></button>
			<button class="tab" onclick="switchTab('team')" id="tab-team"></button>
			<button class="tab" onclick="switchTab('quest')" id="tab-quest"></button>
			<button class="tab" onclick="switchTab('achievements')" id="tab-achievements"></button>
		</div>

		<div id="tab-content-buy" class="tab-content active">
			<div class="section-label" id="sl-market"></div>
			<div id="news-bulletin-box"
				style="display:none;background:rgba(30,24,12,0.85);border:1px solid var(--gold);border-radius:4px;margin-bottom:0.6rem;overflow:hidden;">
			</div>
			<div class="trade-table-wrap">
				<table class="trade-table">
					<thead>
						<tr>
							<th id="th-goods"></th>
							<th id="th-price"></th>
							<th id="th-stock"></th>
							<th id="th-owned"></th>
							<th id="th-buyqty"></th>
							<th id="th-subtotal"></th>
						</tr>
					</thead>
					<tbody id="buy-table-body"></tbody>
				</table>
			</div>
			<div class="table-footer">
				<div class="total-price" id="buy-total-label"><span id="buy-total-label-text"></span><span
						id="buy-total">0</span></div>
				<button class="btn-trade" onclick="executeBuy()" id="btn-confirm-buy"></button>
			</div>
		</div>

		<div id="tab-content-inventory" class="tab-content">
			<div class="section-label" id="sl-inventory"></div>
			<div class="trade-table-wrap">
				<table class="trade-table">
					<thead>
						<tr>
							<th id="th-goods2"></th>
							<th id="th-costprice"></th>
							<th id="th-mktprice"></th>
							<th id="th-qty"></th>
							<th id="th-sellqty"></th>
							<th id="th-subtotal2"></th>
						</tr>
					</thead>
					<tbody id="inv-table-body"></tbody>
				</table>
			</div>
			<div class="table-footer">
				<div class="total-price" id="sell-total-label"><span id="sell-total-label-text"></span><span
						id="sell-total">0</span></div>
				<button class="btn-trade sell" onclick="executeSell()" id="btn-confirm-sell"></button>
			</div>
		</div>

		<div id="tab-content-weapon" class="tab-content">
			<div class="equip-layout">
				<div>
					<div class="equip-section-title" id="es-team-weapon"></div>
					<div id="weapon-member-list"></div>
				</div>
				<div>
					<div class="equip-section-title" id="es-weapon-shop"></div>
					<div class="shop-items-grid" id="weapon-shop"></div>
					<div class="equip-section-title" id="es-weapon-wh" style="margin-top:1rem;"></div>
					<div id="weapon-warehouse-section"></div>
				</div>
			</div>
		</div>

		<div id="tab-content-armor" class="tab-content">
			<div class="equip-layout">
				<div>
					<div class="equip-section-title" id="es-team-armor"></div>
					<div id="armor-member-list"></div>
				</div>
				<div>
					<div class="equip-section-title" id="es-armor-shop"></div>
					<div class="shop-items-grid" id="armor-shop"></div>
					<div class="equip-section-title" id="es-armor-wh" style="margin-top:1rem;"></div>
					<div id="armor-warehouse-section"></div>
				</div>
			</div>
		</div>

		<div id="tab-content-transport" class="tab-content">
			<div class="section-label" id="sl-transport"></div>
			<div class="transport-grid" id="transport-grid"></div>
		</div>

		<div id="tab-content-team" class="tab-content">
			<div class="section-label" id="sl-team"></div>
			<div class="team-grid" id="team-grid"></div>
		</div>

		<div id="tab-content-quest" class="tab-content">
			<div class="section-label" id="sl-quest"></div>
			<div class="quest-list" id="quest-list"></div>
		</div>

		<div id="tab-content-achievements" class="tab-content">
			<div id="achievement-list" style="display:flex;flex-direction:column;gap:0.5rem;padding:0.4rem 0;"></div>
		</div>
	</div>

	<div class="modal-overlay" id="travel-modal">
		<div class="modal-box">
			<button class="btn-close-modal" onclick="closeTravel()">✕</button>
			<div class="modal-title" id="travel-modal-title"></div>
			<div id="travel-active-transport"
				style="font-size: 0.72rem; color: var(--gold); margin-bottom: 0.8rem; letter-spacing: 0.08em"></div>
			<div class="city-choose-grid" id="city-grid" style="grid-template-columns: 1fr 1fr"></div>
			<div id="travel-modal-hint" style="font-size: 0.7rem; color: var(--text3); margin-top: 0.6rem"></div>
		</div>
	</div>

	<div class="modal-overlay" id="combat-modal" style="z-index: 3000;">
		<div class="modal-box" style="max-width: 600px; width: 90%; height: 85vh; padding: 1.2rem;">
			<div class="combat-container">
				<div class="combat-header">
					<div class="modal-title" id="combat-title" style="font-size: 1.2rem; margin-bottom: 0.2rem;"></div>
					<div id="combat-subtitle" style="font-size: 0.75rem; color: var(--text3);"></div>
				</div>
				<div class="combat-arena">
					<div class="combat-side">
						<div class="combat-side-title" id="combat-ally-title"></div>
						<div id="combat-allies-list"></div>
					</div>
					<div class="combat-side">
						<div class="combat-side-title" id="combat-enemy-title"></div>
						<div id="combat-enemies-list"></div>
					</div>
				</div>
				<div class="combat-log-wrapper" id="combat-log-scroll">
					<div id="combat-log-container"></div>
				</div>
				<div class="combat-actions-grid">
					<button class="combat-btn" id="combat-btn-auto" onclick="combatToggleAuto()"></button>
					<button class="combat-btn" id="combat-btn-attack" onclick="combatManualAttack()"></button>
					<button class="combat-btn" id="combat-btn-flee" onclick="combatFlee()"></button>
					<button class="combat-btn" id="combat-btn-surrender" onclick="combatSurrender()"></button>
					<button class="combat-btn" id="combat-btn-skip" onclick="combatSkipToResult()"></button>
				</div>
			</div>
		</div>
	</div>

	<script src="lang.js"></script>
	<script src="data.js"></script>
	<script src="function.js"></script>
	<script src="music.js"></script>

</body>

</html>

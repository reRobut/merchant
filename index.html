<!doctype html>
<html lang="zh">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Merchant</title>
		<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Serif+SC:wght@300;400;500;700&family=IM+Fell+English+SC&display=swap" rel="stylesheet" />
		<link rel="stylesheet" href="style.css">
	</head>
	<body>
		<div id="screen-title" class="screen active">
			<div class="title-deco">
				<div class="game-title-cn" id="t-title-cn">游商模拟器</div>
				<div class="game-title-en">MERCHANT</div>
			</div>
			<div class="title-ornament" id="t-ornament">— 行商四海，富甲天下 —</div>
			<div class="menu-list">
				<button class="menu-btn" onclick="showNewGame()" id="t-new-game">开始新游戏</button>
				<button class="menu-btn" onclick="document.getElementById('save-file-input').click()" id="t-load-game">继续游戏</button>
				<div class="lang-inline-row">
					<button class="lang-inline-btn active" id="lang-btn-zh" onclick="chooseLang('zh')">中文</button>
					<span class="lang-divider">·</span>
					<button class="lang-inline-btn" id="lang-btn-en" onclick="chooseLang('en')">English</button>
				</div>
			</div>
			<input type="file" id="save-file-input" accept=".json" onchange="loadSaveFile(event)" />
			<div class="version-tag">DEMO v0.1 · by 纯一星鸣</div>
		</div>

		<div id="screen-newgame" class="screen">
			<button class="btn-back" id="btn-back-newgame" onclick="showScreen('title')">← 返回</button>
			<div class="panel">
				<div class="panel-title" id="ng-title">创建角色</div>
				<div class="field-group">
					<label class="field-label" id="ng-name-label">角色名称</label>
					<input type="text" class="game-input" id="char-name" placeholder="请输入角色名..." maxlength="12" />
				</div>
				<div class="field-group">
					<label class="field-label" id="ng-country-label">选择国家</label>
					<div class="country-grid" id="country-grid"></div>
				</div>
				<button class="btn-primary" onclick="startGame()" id="ng-start">踏上旅途</button>
			</div>
		</div>

		<div id="screen-game" class="screen" style="flex-direction: column">
			<div class="topbar">
				<div class="topbar-city" id="city-name">—</div>
				<div class="topbar-stats">
					<div class="stat-item">💰 <span class="stat-val gold" id="stat-gold">—</span></div>
					<div class="stat-item"><span class="stat-val" id="stat-day">第1天</span></div>
					<div class="stat-item"><span class="stat-val" id="stat-rep">声誉: 0</span></div>
				</div>
				<div class="topbar-right">
					<button class="btn-sm" onclick="openTravel()">前往城市 ▸</button>
					<button class="btn-sm" onclick="saveGame()">保存存档</button>
				</div>
			</div>

			<div class="tabs">
				<button class="tab active" onclick="switchTab('buy')" id="tab-buy">买入</button>
				<button class="tab" onclick="switchTab('inventory')" id="tab-inv">库存</button>
				<button class="tab" onclick="switchTab('weapon')" id="tab-weapon">武器</button>
				<button class="tab" onclick="switchTab('armor')" id="tab-armor">防具</button>
				<button class="tab" onclick="switchTab('transport')" id="tab-transport">交通</button>
				<button class="tab" onclick="switchTab('team')" id="tab-team">团队</button>
				<button class="tab" onclick="switchTab('quest')" id="tab-quest">任务</button>
			</div>

			<div id="tab-content-buy" class="tab-content active">
				<div class="section-label">市场商品</div>
				<div class="trade-table-wrap">
					<table class="trade-table">
						<thead>
							<tr>
								<th>商品</th>
								<th>单价</th>
								<th>库存</th>
								<th>已拥有</th>
								<th>购买数量</th>
								<th>计价</th>
							</tr>
						</thead>
						<tbody id="buy-table-body"></tbody>
					</table>
				</div>
				<div class="table-footer">
					<div class="total-price">总价：<span id="buy-total">0</span> 币</div>
					<button class="btn-trade" onclick="executeBuy()">确认购买</button>
				</div>
			</div>

			<div id="tab-content-inventory" class="tab-content">
				<div class="section-label">我的库存</div>
				<div class="trade-table-wrap">
					<table class="trade-table">
						<thead>
							<tr>
								<th>商品</th>
								<th>进价</th>
								<th>市价</th>
								<th>数量</th>
								<th>售出数量</th>
								<th>计价</th>
							</tr>
						</thead>
						<tbody id="inv-table-body"></tbody>
					</table>
				</div>
				<div class="table-footer">
					<div class="total-price">售出总额：<span id="sell-total">0</span> 币</div>
					<button class="btn-trade sell" onclick="executeSell()">确认售出</button>
				</div>
			</div>

			<div id="tab-content-weapon" class="tab-content">
				<div class="equip-layout">
					<div>
						<div class="equip-section-title">团队武器装备</div>
						<div id="weapon-member-list"></div>
					</div>
					<div>
						<div class="equip-section-title">武器商店</div>
						<div class="shop-items-grid" id="weapon-shop"></div>
					</div>
				</div>
			</div>

			<div id="tab-content-armor" class="tab-content">
				<div class="equip-layout">
					<div>
						<div class="equip-section-title">团队防具装备</div>
						<div id="armor-member-list"></div>
					</div>
					<div>
						<div class="equip-section-title">防具商店</div>
						<div class="shop-items-grid" id="armor-shop"></div>
					</div>
				</div>
			</div>

			<div id="tab-content-transport" class="tab-content">
				<div class="section-label">可用交通工具</div>
				<div class="transport-grid" id="transport-grid"></div>
			</div>

			<div id="tab-content-team" class="tab-content">
				<div class="section-label">团队成员</div>
				<div class="team-grid" id="team-grid"></div>
			</div>

			<div id="tab-content-quest" class="tab-content">
				<div class="section-label">可接任务</div>
				<div class="quest-list" id="quest-list"></div>
			</div>
		</div>

		<div class="modal-overlay" id="travel-modal">
			<div class="modal-box">
				<button class="btn-close-modal" onclick="closeTravel()">✕</button>
				<div class="modal-title" id="travel-modal-title">选择目的地</div>
				<div id="travel-active-transport" style="font-size: 0.72rem; color: var(--gold); margin-bottom: 0.8rem; letter-spacing: 0.08em"></div>
				<div class="city-choose-grid" id="city-grid" style="grid-template-columns: 1fr 1fr"></div>
				<div id="travel-modal-hint" style="font-size: 0.7rem; color: var(--text3); margin-top: 0.6rem">旅行消耗时间与汽油，注意携带量</div>
			</div>
		</div>

		<div class="modal-overlay" id="combat-modal" style="z-index: 3000;">
			<div class="modal-box" style="max-width: 600px; width: 90%; height: 85vh; padding: 1.2rem;">
				<div class="combat-container">
					<div class="combat-header">
						<div class="modal-title" id="combat-title" style="font-size: 1.2rem; margin-bottom: 0.2rem;">⚔️ 遭遇战斗 ⚔️</div>
						<div id="combat-subtitle" style="font-size: 0.75rem; color: var(--text3);">回合制策略交锋</div>
					</div>
					
					<div class="combat-arena">
						<div class="combat-side">
							<div class="combat-side-title" id="combat-ally-title">我的团队</div>
							<div id="combat-allies-list"></div>
						</div>
						<div class="combat-side">
							<div class="combat-side-title" id="combat-enemy-title">敌方队列</div>
							<div id="combat-enemies-list"></div>
						</div>
					</div>

					<div class="combat-log-wrapper" id="combat-log-scroll">
						<div id="combat-log-container"></div>
					</div>

					<div class="combat-actions-grid">
						<button class="combat-btn" id="combat-btn-auto" onclick="combatToggleAuto()">自动攻击</button>
						<button class="combat-btn" id="combat-btn-attack" onclick="combatManualAttack()">攻击</button>
						<button class="combat-btn" id="combat-btn-heal" onclick="combatHeal()">治疗</button>
						<button class="combat-btn" id="combat-btn-flee" onclick="combatFlee()">逃跑</button>
						<button class="combat-btn" id="combat-btn-surrender" onclick="combatSurrender()">投降</button>
					</div>
				</div>
			</div>
		</div>

		<script src="lang.js"></script>
		<script src="data.js"></script>
		<script>
			
			// ── 货币补丁：统一改为"币" / "coins" ──
			document.addEventListener("DOMContentLoaded", function() {
				if (typeof LANG !== "undefined") {
					if (LANG.zh) LANG.zh.gold = "币";
					if (LANG.en) LANG.en.gold = "coins";
				}
			});


			const TEAM_TEMPLATES = [{ name: "__PLAYER__", role: "", icon: "🧑‍💼", wage: 0, weapon: null, armor: null, isPlayer: true }];

		
			function genName() {
				const isZh = LANG.current === "zh";
				if (isZh) {
					const sur = NPC_SURNAMES_ZH[Math.floor(Math.random() * NPC_SURNAMES_ZH.length)];
					const giv = NPC_GIVEN_ZH[Math.floor(Math.random() * NPC_GIVEN_ZH.length)];
					// 偶尔双字名
					const extra = Math.random() < 0.4 ? NPC_GIVEN_ZH[Math.floor(Math.random() * NPC_GIVEN_ZH.length)] : "";
					return sur + giv + extra;
				} else {
					const first = NPC_FIRST_EN[Math.floor(Math.random() * NPC_FIRST_EN.length)];
					const last = NPC_LAST_EN[Math.floor(Math.random() * NPC_LAST_EN.length)];
					return first + " " + last;
				}
			}

			function genTalent() {
				const factor = Math.random() * Math.random() * Math.random();
				return Math.round((1.0 + 9.0 * factor) * 10) / 10;
			}

			function genNPC() {
				const atkBase = Math.floor(Math.random() * 101); // 0-100
				const defBase = Math.floor(Math.random() * 101); // 0-100
				const hpBase = Math.floor(200 + Math.random() * 201); // 200-400
				const talent = genTalent(); // 1.0-10.0，大多数接近1
				// 天赋随机加成攻击、防御或HP其中一项
				const roll = Math.random();
				const talentOn = roll < 0.33 ? "atk" : roll < 0.66 ? "def" : "hp";
				const atkTotal = talentOn === "atk" ? Math.round(atkBase * talent) : atkBase;
				const defTotal = talentOn === "def" ? Math.round(defBase * talent) : defBase;
				const hpTotal = talentOn === "hp" ? Math.round(hpBase * talent) : hpBase;
				// 工资 = (攻击 + 防御 + HP) × 天赋值 / 10
				const wage = Math.max(1, Math.round((atkTotal + defTotal + hpTotal) * talent / 10));
				const name = genName();
				const isZh = LANG.current === "zh";
				return {
					name,
					icon: "🧑",
					role: isZh ? "旅人" : "Traveler",
					atkBase,
					defBase,
					hpBase,
					talent,
					talentOn,
					atk: atkTotal,
					def: defTotal,
					hp: hpTotal,
					wage,
					weapon: null,
					armor: null,
					rescued: true,
				};
			}

			function memberCombatPower(m) {
				const armorDef = m.armor ? ARMORS.find((a) => a.id === m.armor)?.def || 0 : 0;
				const totalDef = (m.def || 0) + armorDef;
				return Math.max(Math.floor((m.atk || 0) * 0.05), (m.atk || 0) - totalDef);
			}

			function getTransportFreeSeats() {
				const transport = getActiveTransport();
				if (!transport) return 0;
				const maxPassengers = transport.passengers || 0;
				const occupied = G.team.filter((m) => m.wage > 0).length;
				return Math.max(0, maxPassengers - occupied);
			}

			const QUESTS = [
				{
					id: "q1",
					title: "丝绸之路",
					urgent: false,
					desc: "将20件丝绸运至撒马尔罕，那里的商人愿意高价购买东方货物。",
					reward: "800币 + 声誉+10",
					deadline: "第15天",
					accepted: false,
				},
			];

			// ══════════════════════════════════
			// GAME STATE
			// ══════════════════════════════════
			let G = {
				lang: "zh",
				charName: "",
				country: "",
				city: "",
				prevCity: "", // 增加对上一座城市的追踪，用于战败、投降返回
				gold: 1000,
				day: 1,
				rep: 0,
				inventory: {}, // {goodId: {qty, avgPrice}}
				cityPrices: {}, // {goodId: price}
				cityStock: {}, // {goodId: qty}
				team: [],
				transports: [],
				quests: [],
			};

			// ══════════════════════════════════
			// SCREENS
			// ══════════════════════════════════
			function showScreen(id) {
				document.querySelectorAll(".screen").forEach((s) => s.classList.remove("active"));
				document.getElementById("screen-" + id).classList.add("active");
			}

			function showNewGame() {
				renderCountryGrid();
				showScreen("newgame");
			}

			function chooseLang(lang) {
				LANG.current = lang;
				G.lang = lang;
				applyLang();
				document.querySelectorAll(".lang-inline-btn").forEach((b) => b.classList.remove("active"));
				const btn = document.getElementById("lang-btn-" + lang);
				if (btn) btn.classList.add("active");
			}

			// ══════════════════════════════════
			// NEW GAME
			// ══════════════════════════════════
			let selectedCountry = "";

			function renderCountryGrid() {
				const grid = document.getElementById("country-grid");
				grid.innerHTML = COUNTRIES.map(
					(c) => `
    <div class="country-card ${selectedCountry === c.id ? "selected" : ""}" onclick="selectCountry('${c.id}',this)">

      ${LANG.current === "zh" ? c.name : c.nameEn}
    </div>
  `,
				).join("");
			}

			function selectCountry(id, el) {
				selectedCountry = id;
				document.querySelectorAll(".country-card").forEach((c) => c.classList.remove("selected"));
				el.classList.add("selected");
			}

			function startGame() {
				const name = document.getElementById("char-name").value.trim();
				if (!name) {
					showToast(T("errName"), "red");
					return;
				}
				if (!selectedCountry) {
					showToast(T("errCountry"), "red");
					return;
				}
				G.charName = name;
				G.country = selectedCountry;
				const cities = CITIES[selectedCountry];
				G.city = cities[Math.floor(Math.random() * cities.length)];
				G.prevCity = G.city; // 默认前一座城市为首发点
				G.gold = 1000;
				G.day = 1;
				G.rep = 0;
				G.inventory = {};
				G.team = TEAM_TEMPLATES.map((t) => {
					const m = { ...t };
					if (m.name === "__PLAYER__") m.name = name;
					return m;
				});
				G.transports = TRANSPORTS.map((t) => ({ ...t }));
				G.quests = QUESTS.map((q) => ({ ...q }));
				generateCityPrices();
				renderGame();
				showScreen("game");
				showToast(`${LANG.current === "zh" ? "欢迎，" : "Welcome, "}${name}！${LANG.current === "zh" ? "你抵达了" : "Arrived at "} ${G.city}`, "gold");
			}

			function generateCityPrices() {
				G.cityPrices = {};
				G.cityStock = {};
				GOODS.forEach((g) => {
					const price = Math.round(g.priceMin + Math.random() * (g.priceMax - g.priceMin));
					G.cityPrices[g.id] = price;
					G.cityStock[g.id] = Math.floor(5 + Math.random() * 40);
				});
			}

			function priceLevel(goodId) {
				const g = GOODS.find((x) => x.id === goodId);
				if (!g) return 0.5;
				const price = G.cityPrices[goodId] || g.priceMin;
				const range = g.priceMax - g.priceMin;
				if (range === 0) return 0.5;
				return (price - g.priceMin) / range;
			}

			function priceLevelLabel(goodId) {
				const lvl = priceLevel(goodId);
				if (lvl <= 0.25) return { text: "低价", cls: "lvl-low" };
				if (lvl <= 0.6) return { text: "正常", cls: "lvl-mid" };
				if (lvl <= 0.85) return { text: "高价", cls: "lvl-high" };
				return { text: "暴涨", cls: "lvl-peak" };
			}

			// ══════════════════════════════════
			// RENDER GAME
			// ══════════════════════════════════
			function renderGame() {
				updateTopbar();
				renderBuyTable();
				renderInvTable();
				renderWeaponTab();
				renderArmorTab();
				renderTransportGrid();
				renderTeamGrid();
				renderQuestList();
			}

			function updateTopbar() {
				document.getElementById("city-name").textContent = `📍 ${G.city}`;
				document.getElementById("stat-gold").textContent = G.gold.toLocaleString() + (LANG.current === "zh" ? " 币" : " coins");

				document.getElementById("stat-day").textContent = `第 ${G.day} 天`;
				document.getElementById("stat-rep").textContent = `声誉: ${G.rep}`;
			}

			// ── BUY TABLE ──
			function renderBuyTable() {
				const tbody = document.getElementById("buy-table-body");
				tbody.innerHTML = GOODS.map((g) => {
					const price = G.cityPrices[g.id] || g.priceMin;
					const stock = G.cityStock[g.id] || 0;
					const owned = G.inventory[g.id]?.qty || 0;
					return `<tr>
      <td>
        <span class="item-name">${g.icon} ${g.name}</span>
      </td>
      <td style="font-weight:500">${price.toLocaleString()}</td>
      <td>${stock}</td>
      <td class="qty-owned">${owned}</td>
      <td>
        <div class="qty-controls">
          <input type="number" class="qty-input" id="buy-qty-${g.id}" value="0" min="0" max="${stock}" oninput="calcBuyTotal()">
          <button class="qty-shortcut" onclick="setBuyQty('${g.id}',${stock})">MAX</button>
          <button class="qty-shortcut" onclick="setBuyQty('${g.id}',0)">0</button>
        </div>
      </td>
      <td class="price-tag" id="buy-line-${g.id}">—</td>
    </tr>`;
				}).join("");
			}

			function setBuyQty(id, qty) {
				const inp = document.getElementById("buy-qty-" + id);
				if (inp) {
					inp.value = qty;
					calcBuyTotal();
				}
			}

			function calcBuyTotal() {
				let total = 0;
				GOODS.forEach((g) => {
					const qty = parseInt(document.getElementById("buy-qty-" + g.id)?.value || 0);
					const price = G.cityPrices[g.id] || g.priceMin;
					const sub = qty * price;
					total += sub;
					const lineEl = document.getElementById("buy-line-" + g.id);
					if (lineEl) lineEl.textContent = sub > 0 ? sub.toLocaleString() + " 币" : "—";
				});
				document.getElementById("buy-total").textContent = total.toLocaleString();
			}

			function executeBuy() {
				let total = 0;
				const purchases = [];
				GOODS.forEach((g) => {
					const qty = parseInt(document.getElementById("buy-qty-" + g.id)?.value || 0);
					if (qty <= 0) return;
					const price = G.cityPrices[g.id] || g.priceMin;
					const stock = G.cityStock[g.id] || 0;
					const actualQty = Math.min(qty, stock);
					total += actualQty * price;
					purchases.push({ g, qty: actualQty, price });
				});
				if (total === 0) {
					showToast(T("errNoGoods"), "red");
					return;
				}
				if (total > G.gold) {
					showToast(T("errGold"), "red");
					return;
				}
				purchases.forEach(({ g, qty, price }) => {
					if (!G.inventory[g.id]) G.inventory[g.id] = { qty: 0, avgPrice: price };
					const prev = G.inventory[g.id];
					const newQty = prev.qty + qty;
					prev.avgPrice = Math.round((prev.avgPrice * prev.qty + price * qty) / newQty);
					prev.qty = newQty;
					G.cityStock[g.id] = (G.cityStock[g.id] || 0) - qty;
				});
				G.gold -= total;
				showToast(T("toastBuy") + " " + total.toLocaleString() + " " + T("gold"), "gold");
				renderGame();
			}

			// ── INVENTORY TABLE ──
			function renderInvTable() {
				const tbody = document.getElementById("inv-table-body");
				const items = Object.entries(G.inventory).filter(([, d]) => d.qty > 0);
				if (items.length === 0) {
					tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--text3);padding:1.5rem;">库存为空</td></tr>`;
					return;
				}
				tbody.innerHTML = items
					.map(([id, data]) => {
						const g = GOODS.find((x) => x.id === id);
						if (!g) return "";
						const mktPrice = G.cityPrices[g.id] || g.priceMin;
						const profit = mktPrice - data.avgPrice;
						const profitPct = data.avgPrice > 0 ? Math.round((profit / data.avgPrice) * 100) : 0;
						const profitStr = profit >= 0 ? `<span class="price-sell">+${profit.toLocaleString()} (+${profitPct}%)</span>` : `<span class="price-buy">${profit.toLocaleString()} (${profitPct}%)</span>`;

        <div class="qty-controls">

          <button class="qty-shortcut" onclick="setSellQty('${id}',${data.qty})">MAX</button>

			function setSellQty(id, qty) {
				const inp = document.getElementById("sell-qty-" + id);
				if (inp) {
					inp.value = qty;
					calcSellTotal();
				}
			}

			function calcSellTotal() {
				let total = 0;
				Object.entries(G.inventory).forEach(([id, data]) => {
					const qty = parseInt(document.getElementById("sell-qty-" + id)?.value || 0);
					const g = GOODS.find((x) => x.id === id);
					if (!g) return;
					const price = G.cityPrices[g.id] || g.priceMin;
					const sub = qty * price;
					total += sub;
					const lineEl = document.getElementById("sell-line-" + id);
					if (lineEl) lineEl.textContent = sub > 0 ? sub.toLocaleString() + " 币" : "—";
				});
				document.getElementById("sell-total").textContent = total.toLocaleString();
			}

			function executeSell() {
				let total = 0;
				const sells = [];
				Object.entries(G.inventory).forEach(([id, data]) => {
					const qty = parseInt(document.getElementById("sell-qty-" + id)?.value || 0);
					if (qty <= 0 || qty > data.qty) return;
					const g = GOODS.find((x) => x.id === id);
					if (!g) return;
					const price = G.cityPrices[g.id] || g.priceMin;
					total += qty * price;
					sells.push({ id, qty, price });
				});
				if (total === 0) {
					showToast(T("errNoSell"), "red");
					return;
				}
				sells.forEach(({ id, qty }) => {
					G.inventory[id].qty -= qty;
					if (G.inventory[id].qty <= 0) delete G.inventory[id];
				});
				G.gold += total;
				G.rep += Math.floor(total / 200);
				showToast(T("toastSell") + " " + total + " " + T("gold"), "gold");
				renderGame();
			}

			function getActiveTransport() {

			function openTravel() {
				const country = G.country;
				const allCities = (CITIES[country] || []).filter((c) => c !== G.city);
				const shuffled = allCities.sort(() => Math.random() - 0.5).slice(0, 2);
				const transport = getActiveTransport();
				const fuelGood = G.inventory["fuel"];
				const fuelOwned = fuelGood ? fuelGood.qty : 0;

				const options = shuffled.map((city) => {
					const dist = Math.floor(1 + Math.random() * 20);
					const days = Math.ceil(dist / transport.spd);
					const fuelNeeded = days * transport.fuelCost;
					const crimeRate = Math.floor(15 + Math.random() * 66); // 15–80
					return { city, dist, days, fuelNeeded, crimeRate };
				});

				G._travelOptions = options;
				const grid = document.getElementById("city-grid");
				const distLabel = T("travelDist");
				const daysLabel = T("travelDays");
				const fuelLabel = T("travelFuel");

				grid.innerHTML = options
					.map((o, i) => {
						const canGo = transport.fuelCost === 0 || fuelOwned >= o.fuelNeeded;
						const fuelStr = transport.fuelCost > 0 ? `<span style="color:var(--red2)">⛽ ${o.fuelNeeded}${fuelLabel}</span>` : `<span style="color:var(--green2)">⛽ 0</span>`;
						const crimeColor = o.crimeRate < 30 ? "var(--green2)" : o.crimeRate < 55 ? "var(--gold)" : "var(--red2)";
						const crimeLabel = LANG.current === "zh" ? "治安" : "Crime";
						return `
    <button class="city-btn ${canGo ? "" : "disabled-city"}" onclick="${canGo ? `confirmTravel(${i})` : ""}">
      <strong>${o.city}</strong>
      <div style="font-size:0.65rem;margin-top:4px;display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center;">
        <span>📏 ${o.dist}${distLabel}</span>
        <span>📅 ${o.days}${daysLabel}</span>
        ${fuelStr}
        <span style="color:${crimeColor}">⚠️ ${crimeLabel} ${o.crimeRate}%</span>
      </div>
    </button>`;
					})
					.join("");

				const tName = LANG.current === "zh" ? transport.name : transport.nameEn;
				document.getElementById("travel-active-transport").textContent = `${transport.icon} ${tName} · ${LANG.current === "zh" ? "速度" : "Speed"}: ${transport.spd}`;

				document.getElementById("travel-modal").classList.add("open");
			}

			function closeTravel() {
				document.getElementById("travel-modal").classList.remove("open");
			}

			function confirmTravel(idx) {
				const o = G._travelOptions[idx];
				const transport = getActiveTransport();

				// Deduct fuel
				if (transport.fuelCost > 0) {
					const fuelInv = G.inventory["fuel"];
					if (!fuelInv || fuelInv.qty < o.fuelNeeded) {
						showToast(T("errFuel"), "red");
						return;
					}
					fuelInv.qty -= o.fuelNeeded;
					if (fuelInv.qty <= 0) delete G.inventory["fuel"];
				}

				// 记录当前城市为 prevCity，以便返回
				G.prevCity = G.city;
				G.city = o.city;
				G.day += o.days;
				generateCityPrices();

				// Deduct team wages
				const wage = G.team.reduce((s, m) => s + m.wage, 0);
				G.gold -= wage * o.days;

				closeTravel();
				renderGame();

				// Trigger road events (one per day of travel)
				setTimeout(() => triggerRoadEvents(o.crimeRate, o.days), 600);
			}

			// ── ROAD EVENTS ──
			function getRoadEvent(crimeRate) {
				const nothing_weight = 180 - 2 * crimeRate;
				const steal_weight = 0.6 * crimeRate;
				const police_weight = 0.5 * crimeRate;
				const criminal_weight = crimeRate;
				const person_weight = 25;
				const merchant_weight = 25;

				const events = [
					{ id: "nothing", weight: nothing_weight },
					{ id: "steal", weight: steal_weight },
					{ id: "police", weight: police_weight },
					{ id: "criminal", weight: criminal_weight },
					{ id: "person", weight: person_weight },
					{ id: "merchant", weight: merchant_weight },
				];

				const total = events.reduce((s, e) => s + e.weight, 0);
				const roll = Math.random() * total;
				let sum = 0;
				for (const e of events) {
					sum += e.weight;
					if (roll <= sum) return e.id;
				}
				return "nothing";
			}

			// 生成特定数量与等级的敌对队列
			function generateEnemyForce(typeStr, cnType) {
				const size = Math.floor(Math.random() * 3) + 1; // 1-3名
				const party = [];
				const tiers = ["E", "D", "C", "B", "A", "S"];
				
				for(let i=0; i<size; i++) {
					const atk = Math.floor(Math.random() * 101);
					const def = Math.floor(Math.random() * 101);
					const hp = Math.floor(200 + Math.random() * 201); // 200-400 HP
					
					// 随机选取武器与防具索引 0-6 (0=无, 1-6对应实际物品)
					const wIdx = Math.floor(Math.random() * 7);
					const aIdx = Math.floor(Math.random() * 7);
					const avg = (wIdx + aIdx) / 2;
					
					let tier = "E";
					if (avg <= 1) tier = "E";
					else if (avg <= 2) tier = "D";
					else if (avg <= 3) tier = "C";
					else if (avg <= 4) tier = "B";
					else if (avg <= 5) tier = "A";
					else tier = "S";
					
					party.push({
						name: `${cnType}#${i+1}`,
						type: typeStr,
						atk: atk,
						def: def,
						hp: hp,
						maxHp: hp,
						wIdx: wIdx,
						aIdx: aIdx,
						tier: tier,
						hasAttemptedFlee: false
					});
				}
				return party;
			}

			function getForceDesc(force) {
				return `${force.length}名${force[0].name.substring(0,3)}（${force.map(f => f.tier + '级').join('，')}）`;

			let _eventQueue = [];
			let _autoAdvanceTimer = null;

			function triggerRoadEvents(crimeRate, days) {
				_eventQueue = [];
				for (let d = 0; d < days; d++) {
					const eventId = getRoadEvent(crimeRate);
					_eventQueue.push({ day: d + 1, totalDays: days, eventId });
				}
				renderGame();
				_showNextEvent();
			}

			function _showNextEvent() {
				if (_autoAdvanceTimer) {
					clearTimeout(_autoAdvanceTimer);
					_autoAdvanceTimer = null;
				}
				if (_eventQueue.length === 0) {
					const old = document.getElementById("road-event-modal");
					if (old) old.remove();
					return;
				}
				const item = _eventQueue.shift();
				_renderEventModal(item);
			}

			function _resolveChoice(resolveFn) {
				const result = resolveFn();
				renderGame();
				_showOutcomeModal(result);
			}

			function _showOutcomeModal(result) {
				const isZh = LANG.current === "zh";
				const old = document.getElementById("road-event-modal");
				if (old) old.remove();

				let effects = "";
				if (result.goldDelta > 0) effects += `<span style="color:var(--gold2)">💰 +${result.goldDelta}</span>`;
				if (result.goldDelta < 0) effects += `<span style="color:var(--red2)">💰 ${result.goldDelta}</span>`;
				if (result.repDelta > 0) effects += `<span style="color:var(--green2)">⭐ +${result.repDelta}</span>`;
				if (result.repDelta < 0) effects += `<span style="color:var(--red2)">⭐ ${result.repDelta}</span>`;

				const remaining = _eventQueue.length;
				const closeLabel = remaining === 0 ? (isZh ? "抵达目的地" : "Arrive") : isZh ? "继续前行" : "Continue";

				const modal = document.createElement("div");
				modal.id = "road-event-modal";
				modal.className = "modal-overlay open";
				modal.innerHTML = `
	<div class="modal-box" style="text-align:center;max-width:340px;padding-bottom:1.4rem;">
	  <div style="font-size:1.6rem;margin-bottom:0.5rem;">📜</div>
	  <div class="modal-title" style="margin-bottom:0.7rem;">${isZh ? "结果" : "Outcome"}</div>
	  <div style="font-size:0.88rem;color:var(--text);line-height:1.7;margin-bottom:0.9rem;">${result.text}</div>
	  ${effects ? `<div style="display:flex;gap:0.8rem;justify-content:center;font-size:0.85rem;margin-bottom:1rem;">${effects}</div>` : ""}
	  <button class="btn-primary" style="margin-top:0;" onclick="document.getElementById('road-event-modal').remove();_showNextEvent();">${closeLabel}</button>
	</div>`;
				document.body.appendChild(modal);
			}

			function _buildProgressBar(day, totalDays) {
				let html = '<div style="display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:1.1rem;">';
				for (let i = 1; i <= totalDays; i++) {
					if (i < day) {
						html += `<span style="display:inline-block;width:10px;height:10px;background:var(--gold);border:1px solid var(--gold);"></span>`;
					} else if (i === day) {
						html += `<span style="display:inline-block;width:16px;height:16px;background:transparent;border:2px solid var(--gold2);box-shadow:0 0 6px rgba(201,168,76,0.5);"></span>`;
					} else {
						html += `<span style="display:inline-block;width:10px;height:10px;background:transparent;border:1px solid var(--border2);"></span>`;
					}
				}
				html += "</div>";
				return html;
			}

			function _renderEventModal(item) {
				const old = document.getElementById("road-event-modal");
				if (old) old.remove();
				if (_autoAdvanceTimer) {
					clearTimeout(_autoAdvanceTimer);
					_autoAdvanceTimer = null;
				}

				const { day, totalDays, eventId } = item;
				const data = ROAD_EVENT_DATA[eventId];
				
				// 实时触发初始化敌军队列结构与特定文案描述
				if (data.setup) {
					data.setup();
				}

				const isZh = LANG.current === "zh";
				let desc = isZh ? data.zh : data.en;
				if (isZh && data.dynamicZh) {
					desc = data.dynamicZh();
				}

				const titleLabel = isZh ? "途中事件" : "Road Event";
				const hasChoices = data.choices && data.choices.length > 0;
				const isPassive = !hasChoices;

				let passiveResult = null;
				if (isPassive && data.resolve) {
					passiveResult = data.resolve();
					renderGame();
				}

				const progressBar = _buildProgressBar(day, totalDays);

				let choicesHtml = "";
				if (hasChoices) {
					choicesHtml = `<div style="display:flex;flex-direction:column;gap:0.5rem;margin-top:0.8rem;">`;
					data.choices.forEach((c, i) => {
						const label = isZh ? c.label_zh : c.label_en;
						if (c.isCombatTrigger) {
							choicesHtml += `<button class="btn-primary" style="margin-top:0;font-size:0.8rem;border-color:var(--red);" onclick="initiateCombatBridge('${eventId}')">${label}</button>`;
						} else {
							choicesHtml += `<button class="btn-primary" style="margin-top:0;font-size:0.8rem;" onclick="_resolveChoiceByIndex('${eventId}',${i})">${label}</button>`;
						}
					});
					choicesHtml += `</div>`;
				}

				let passiveEffectHtml = "";
				if (passiveResult) {
					if (passiveResult.goldDelta < 0) passiveEffectHtml += `<span style="color:var(--red2)">💰 ${passiveResult.goldDelta}</span> `;
					if (passiveResult.goldDelta > 0) passiveEffectHtml += `<span style="color:var(--gold2)">💰 +${passiveResult.goldDelta}</span> `;
					if (passiveEffectHtml) passiveEffectHtml = `<div style="margin-bottom:0.6rem;font-size:0.85rem;">${passiveEffectHtml}</div>`;
				}

				const bodyText = isPassive && passiveResult ? passiveResult.text : desc;

				const remaining = _eventQueue.length;
				const isLast = remaining === 0;
				const continueLabel = isLast ? (isZh ? "抵达目的地" : "Arrive") : isZh ? "继续前行" : "Continue";

				const timerBarHtml = isPassive
					? `
					<div id="event-timer-track" style="width:100%;height:3px;background:var(--bg5);border-radius:2px;margin-bottom:1rem;overflow:hidden;">
						<div id="event-timer-fill" style="height:100%;width:100%;background:var(--gold);transform-origin:left;transition:transform 3s linear;"></div>
					</div>`
					: "";

				const modal = document.createElement("div");
				modal.id = "road-event-modal";
				modal.className = "modal-overlay open";
				modal.innerHTML = `
	<div class="modal-box" style="text-align:center;max-width:340px;padding-bottom:1.4rem;">
	  <div style="margin-bottom:0.2rem;font-size:0.6rem;color:var(--text3);letter-spacing:0.15em;">
	    ${isZh ? `第 ${day} 天 · 共 ${totalDays} 天` : `Day ${day} of ${totalDays}`}
	  </div>
	  ${progressBar}
	  ${timerBarHtml}
	  <div style="font-size:2.4rem;margin-bottom:0.5rem;">${data.icon}</div>
	  <div class="modal-title" style="margin-bottom:0.6rem;">${titleLabel}</div>
	  <div style="font-size:0.85rem;color:var(--text);line-height:1.6;margin-bottom:0.5rem;">${bodyText}</div>
	  ${passiveEffectHtml}
	  ${hasChoices ? choicesHtml : `<button id="event-continue-btn" class="btn-primary" style="margin-top:0.8rem;opacity:${isPassive ? 0.45 : 1};transition:opacity 0.4s;">${continueLabel}</button>`}
	  ${isPassive ? `<div id="event-auto-hint" style="font-size:0.65rem;color:var(--text3);margin-top:0.5rem;letter-spacing:0.1em;">${isZh ? "3秒后自动继续…" : "Continuing in 3s…"}</div>` : ""}
	</div>`;
				document.body.appendChild(modal);

				if (isPassive) {
					requestAnimationFrame(() => {
						requestAnimationFrame(() => {
							const fill = document.getElementById("event-timer-fill");
							if (fill) fill.style.transform = "scaleX(0)";
						});
					});
					_autoAdvanceTimer = setTimeout(() => {
						_showNextEvent();
					}, 3000);
					const btn = document.getElementById("event-continue-btn");
					if (btn) {
						btn.onclick = () => {
							if (_autoAdvanceTimer) {
								clearTimeout(_autoAdvanceTimer);
								_autoAdvanceTimer = null;
							}
							_showNextEvent();
						};
					}
				}
			}

			function _resolveChoiceByIndex(eventId, idx) {
				const data = ROAD_EVENT_DATA[eventId];
				if (!data || !data.choices || !data.choices[idx]) return;
				_resolveChoice(data.choices[idx].resolve);
			}

			function initiateCombatBridge(eventId) {
				const old = document.getElementById("road-event-modal");
				if (old) old.remove();
				const data = ROAD_EVENT_DATA[eventId];
				startCombatEngine(data.enemies);
			}

			// ══════════════════════════════════
			// CORE COMBAT ENGINE
			// ══════════════════════════════════
			let C = {
				allies: [],
				enemies: [],
				logLines: [],
				isAuto: false,
				combatTimer: null,
				preCombatGold: 0,
				selectedEnemyIdx: 0,
				isExecutingTurn: false
			};

			function startCombatEngine(enemyList) {
				C.preCombatGold = G.gold;
				C.enemies = JSON.parse(JSON.stringify(enemyList)); 
				C.isAuto = false;
				C.selectedEnemyIdx = 0;
				C.logLines = [];
				C.isExecutingTurn = false;
				if(C.combatTimer) clearInterval(C.combatTimer);

				// 转换己方数据并动态计算实时生命上限
				C.allies = G.team.map((m) => {
					let maxHp = 300; 
					if(!m.isPlayer) {
						maxHp = m.hp ?? m.hpBase ?? 200;
					}
					return {
						name: m.name,
						isPlayer: m.isPlayer || false,
						atk: m.atk ?? 30,
						def: m.def ?? 10,
						hp: maxHp,
						maxHp: maxHp,
						weapon: m.weapon,
						armor: m.armor
					};
				});

				document.getElementById("combat-modal").classList.add("open");
				combatLogAdd("⚔️ 战斗开始！我方获得先手执剑突击权。");
				renderCombatScreen();
			}

			function renderCombatScreen() {
				// 渲染我方
				const allyListEl = document.getElementById("combat-allies-list");
				allyListEl.innerHTML = C.allies.map((a) => {
					const hpPct = Math.max(0, (a.hp / a.maxHp) * 100);
					const isDead = a.hp <= 0;
					return `
						<div class="combat-unit-row ${isDead ? 'dead' : ''}">
							<div style="display:flex; justify-content:space-between; font-size:0.75rem;">
								<strong>${a.name} ${a.isPlayer ? '(主角)' : ''}</strong>
								<span>${Math.max(0, a.hp)}/${a.maxHp}</span>
							</div>
							<div class="combat-hp-bar-bg">
								<div class="combat-hp-bar-fill" style="width: ${hpPct}%;"></div>
							</div>
						</div>
					`;
				}).join("");

				// 渲染敌方
				const enemyListEl = document.getElementById("combat-enemies-list");
				enemyListEl.innerHTML = C.enemies.map((e, idx) => {
					const hpPct = Math.max(0, (e.hp / e.maxHp) * 100);
					const isDead = e.hp <= 0;
					const isSelected = C.selectedEnemyIdx === idx;
					return `
						<div class="combat-unit-row ${isDead ? 'dead' : ''} ${isSelected ? 'selected' : ''}" onclick="combatSelectEnemy(${idx})">
							<div style="display:flex; justify-content:space-between; font-size:0.75rem;">
								<span>${e.name}<span class="tier-badge tier-${e.tier}">${e.tier}</span></span>
								<span>${isDead ? '0' : e.hp}/${e.maxHp}</span>
							</div>
							<div class="combat-hp-bar-bg">
								<div class="combat-hp-bar-fill enemy-hp" style="width: ${hpPct}%;"></div>
							</div>
						</div>
					`;
				}).join("");

				// 更新自动化按钮外观
				const autoBtn = document.getElementById("combat-btn-auto");
				if (C.isAuto) {
					autoBtn.classList.add("active-auto");
					autoBtn.textContent = "取消自动";
				} else {
					autoBtn.classList.remove("active-auto");
					autoBtn.textContent = "自动攻击";
				}

				// 如果选中的目标已经阵亡，自动递进转移至下一生存目标
				if (C.enemies[C.selectedEnemyIdx] && C.enemies[C.selectedEnemyIdx].hp <= 0) {
					let nextTarget = C.enemies.findIndex(e => e.hp > 0);
					if (nextTarget !== -1) C.selectedEnemyIdx = nextTarget;
				}
			}

			function combatSelectEnemy(idx) {
				if(C.enemies[idx].hp <= 0) return;
				C.selectedEnemyIdx = idx;
				renderCombatScreen();
			}

			function combatLogAdd(text) {
				const container = document.getElementById("combat-log-container");
				const scrollWrap = document.getElementById("combat-log-scroll");
				const line = document.createElement("div");
				line.className = "combat-log-line";
				line.innerHTML = text;
				container.appendChild(line);
				scrollWrap.scrollTop = scrollWrap.scrollHeight;
			}

			// 按钮功能触发区
			function combatToggleAuto() {
				C.isAuto = !C.isAuto;
				renderCombatScreen();
				if(C.isAuto && !C.isExecutingTurn) {
					executeFullRoundTick();
				}
			}

			function combatManualAttack() {
				if (C.isAuto || C.isExecutingTurn) return;
				executeFullRoundTick();
			}

			function combatHeal() {
				if (C.isAuto || C.isExecutingTurn) return;
				const med = G.inventory["medicine"];
				if(!med || med.qty <= 0) {
					showToast("背囊中缺乏[医用品]！", "red");
					return;
				}

				// 扣除一件医疗资产
				med.qty--;
				if(med.qty <= 0) delete G.inventory["medicine"];
				renderGame();

				// 优先治疗受伤最重且未死的主角或同伴
				let target = C.allies.filter(a => a.hp > 0).sort((a,b) => (a.hp/a.maxHp) - (b.hp/b.maxHp))[0];
				if(target) {
					const oldHp = target.hp;
					target.hp = Math.min(target.maxHp, target.hp + 100);
					combatLogAdd(`🩹 使用医用品！<strong>${target.name}</strong> 恢复了 ${target.hp - oldHp} 点HP。`);
					renderCombatScreen();
				}

				// 治疗不占用常规动作攻击轮，完成后如果开启自动则继续推进，未开启则允许继续操作
			}

			function combatFlee() {
				if (C.isAuto || C.isExecutingTurn) return;
				C.isExecutingTurn = true;
				disableAllCombatButtons(true);
				
				combatLogAdd("🏃 试图在混乱中紧急撤离逃跑...");
				setTimeout(() => {
					if(Math.random() < 0.5) {
						combatLogAdd("<span style='color:var(--green2);'>✓ 逃跑成功！团队安然撤离战场。</span>");
						setTimeout(closeCombatCleanup, 1500);
					} else {
						combatLogAdd("<span style='color:var(--red2);'>❌ 逃跑失败！敌方早已封锁死角，攻势倒灌。</span>");
						// 逃跑失败，浪费本回合，直接转入敌方回合
						setTimeout(() => {
							executeEnemySidePhase();
						}, 1000);
					}
				}, 1000);
			}

			function combatSurrender() {
				if (C.isAuto || C.isExecutingTurn) return;
				if(C.combatTimer) clearInterval(C.combatTimer);
				
				// 计算保留资金 100 + 10%
				G.gold = 100 + Math.floor(C.preCombatGold * 0.1);
				// 剥夺全部货物及非基础载具资产
				G.inventory = {};
				G.transports.forEach(t => {
					if(t.id !== "walk") t.owned = false;
				});
				// 强制遣返至前一个安全驿站城市
				G.city = G.prevCity;
				
				combatLogAdd("<span style='color:var(--red2);'>🏳 投降输一半。你被洗劫一空，仅剩微薄盘缠退回上个城市。</span>");
				renderGame();
				setTimeout(() => {
					document.getElementById("combat-modal").classList.remove("open");
					_showNextEvent();
				}, 2000);
			}

			// 回合循环主架构控制
			function disableAllCombatButtons(disabled) {
				const btns = document.querySelectorAll(".combat-btn");
				btns.forEach(b => {
					if(b.id === "combat-btn-auto") {
						// 自动按钮随时可以点击用来取消自动
						b.disabled = false;
					} else {
						b.disabled = disabled;
					}
				});
			}

			function executeFullRoundTick() {
				C.isExecutingTurn = true;
				disableAllCombatButtons(true);

				// ---- 1. 我方攻击阶段 ----
				let allyQueue = C.allies.filter(a => a.hp > 0);
				let step = 0;

				function nextAllyStrike() {
					if(step >= allyQueue.length) {
						// 我方全部人打完了，判断是否全灭敌人
						if (C.enemies.every(e => e.hp <= 0)) {
							handleCombatVictory();
							return;
						}
						// 否则轮到敌方反击
						setTimeout(executeEnemySidePhase, 1000);
						return;
					}

					let attacker = allyQueue[step];
					// 重新校准攻击有效目标
					let target = C.enemies[C.selectedEnemyIdx];
					if(!target || target.hp <= 0) {
						let liveIdx = C.enemies.findIndex(e => e.hp > 0);
						if(liveIdx !== -1) {
							C.selectedEnemyIdx = liveIdx;
							target = C.enemies[liveIdx];
						}
					}

					if(target) {
						// 复合动态伤害演算
						let wAtk = attacker.weapon ? (WEAPONS.find(w => w.id === attacker.weapon)?.atk || 0) : 0;
						let eDef = target.aIdx > 0 ? (ARMORS[target.aIdx - 1]?.def || 0) : 0;
						
						let totalAtk = attacker.atk + wAtk;
						let totalDef = target.def + eDef;
						let dmg = Math.max(Math.floor(totalAtk * 0.05), totalAtk - totalDef);
						if(dmg <= 0) dmg = 1;

						target.hp -= dmg;
						combatLogAdd(`⚔️ <strong>${attacker.name}</strong> 对 <strong>${target.name}</strong> 造成了 ${dmg} 点伤害。${target.name} 剩余HP为 ${Math.max(0, target.hp)} 点。`);
						
						if(target.hp <= 0) {
							if(target.type === "criminal") {
								combatLogAdd(`<span style='color:var(--green2);'>⛓️ 敌方 [${target.name}] 已无力抵抗，被当场抓捕归案。</span>`);
							} else {
								combatLogAdd(`<span style='color:var(--red2);'>💀 敌方 [${target.name}] 伤势过重，已确认死亡。</span>`);
							}
						}
						renderCombatScreen();
					}

					step++;
					setTimeout(nextAllyStrike, 1000);
				}

				nextAllyStrike();
			}

			function executeEnemySidePhase() {
				let enemyQueue = C.enemies.filter(e => e.hp > 0);
				let step = 0;

				function nextEnemyStrike() {
					// 检查是否所有敌人都行动完毕
					if(step >= enemyQueue.length) {
						// 一轮大回合完整结束，循环判断
						C.isExecutingTurn = false;
						if (C.isAuto) {
							// 自动模式下，1秒后开启下一轮蓄力
							setTimeout(executeFullRoundTick, 1000);
						} else {
							disableAllCombatButtons(false);
						}
						return;
					}

					let enemy = enemyQueue[step];

					// ── 条件分支判定 4：对手HP低于30%触发逃跑检测机制 ──
					if(enemy.hp > 0 && (enemy.hp / enemy.maxHp) < 0.3 && !enemy.hasAttemptedFlee) {
						enemy.hasAttemptedFlee = true;
						if(Math.random() < 0.5) {
							// 触发互动事件弹窗挂起时间线
							C.isAuto = false; // 挂起并强行切断自动化循环
							renderCombatScreen();
							triggerEnemyEscapeIntervention(enemy, step, enemyQueue);
							return; 
						}
					}

					// 正常发动攻击
					if(enemy.hp > 0) {
						let livingAllies = C.allies.filter(a => a.hp > 0);
						if(livingAllies.length === 0) {
							handlePlayerDefeat();
							return;
						}
						// 敌方随机聚焦锁死我方活着的成员
						let target = livingAllies[Math.floor(Math.random() * livingAllies.length)];
						
						let eAtk = enemy.wIdx > 0 ? (WEAPONS[enemy.wIdx - 1]?.atk || 0) : 0;
						let aDef = target.armor ? (ARMORS.find(a => a.id === target.armor)?.def || 0) : 0;
						
						let totalAtk = enemy.atk + eAtk;
						let totalDef = target.def + aDef;
						let dmg = Math.max(Math.floor(totalAtk * 0.05), totalAtk - totalDef);
						if(dmg <= 0) dmg = 1;

						target.hp -= dmg;
						combatLogAdd(`💥 <strong>${enemy.name}</strong> 发动反扑，对 我方 <strong>${target.name}</strong> 造成了 ${dmg} 点伤害。${target.name} 剩余HP为 ${Math.max(0, target.hp)} 点。`);
						
						if(target.hp <= 0) {
							combatLogAdd(`❌ 我方成员 [${target.name}] 支撑不住，受重伤倒地退出战局！`);
							// 校验玩家主角生命是否直接归零
							let playerChar = C.allies.find(a => a.isPlayer);
							if(playerChar && playerChar.hp <= 0) {
								handlePlayerDefeat();
								return;
							}
						}
						renderCombatScreen();
					}

					step++;
					setTimeout(nextEnemyStrike, 1000);
				}

				nextEnemyStrike();
			}

			// 敌方欲逃跑时的交互弹窗拦截器
			function triggerEnemyEscapeIntervention(enemy, currentStep, queueArr) {
				const modal = document.createElement("div");
				modal.id = "escape-intervene-modal";
				modal.className = "modal-overlay open";
				modal.style.zIndex = "4000";
				modal.innerHTML = `
					<div class="modal-box" style="text-align:center; max-width:320px;">
						<div style="font-size:2rem; margin-bottom:0.5rem;">🏃‍♂️</div>
						<div class="modal-title">残血逃跑预警</div>
						<div style="font-size:0.85rem; margin-bottom:1.2rem;">
							敌方 <strong>${enemy.name}</strong> 斗志崩溃，正试图开溜脱离战场！是否进行生死截杀？
						</div>
						<div style="display:flex; gap:0.5rem;">
							<button class="btn-primary" style="margin-top:0; flex:1;" onclick="resolveEnemyEscapeChoice(true, '${enemy.name}', ${currentStep})">绝地追杀</button>
							<button class="btn-primary" style="margin-top:0; flex:1; border-color:var(--text3);" onclick="resolveEnemyEscapeChoice(false, '${enemy.name}', ${currentStep})">放其一条生路</button>
						</div>
					</div>
				`;
				document.body.appendChild(modal);
				
				// 挂起指针
				C._escapeResumeArgs = { step: currentStep + 1, queue: queueArr };
			}

			function resolveEnemyEscapeChoice(wantsPursue, enemyName, currentStep) {
				document.getElementById("escape-intervene-modal").remove();
				let enemy = C.enemies.find(e => e.name === enemyName);
				
				if(wantsPursue) {
					if(Math.random() < 0.5) {
						combatLogAdd(`🎯 追杀成功！我方合围将 <strong>${enemy.name}</strong> 强行截留封锁。`);
						// 被截留，继续承受伤害，不退出战场
					} else {
						combatLogAdd(`💨 逃跑跟丢！<strong>${enemy.name}</strong> 虚晃一枪闪入树林，成功逃脱。`);
						enemy.hp = 0; // 从战场表现层面抹除
					}
				} else {
					combatLogAdd(`🕊️ 纵虎归山。你作壁上观，任由 <strong>${enemy.name}</strong> 仓皇逃离。`);
					enemy.hp = 0; // 退出战局
				}
				
				renderCombatScreen();
				
				// 恢复时间流向下执行
				const args = C._escapeResumeArgs;
				let nextStep = args.step;
				let enemyQueue = args.queue;
				
				// 嵌套继续之前的循环
				let step = nextStep;
				function nextEnemyStrikeResume() {
					if(step >= enemyQueue.length) {
						C.isExecutingTurn = false;
						disableAllCombatButtons(false);
						return;
					}
					let nextEnemy = enemyQueue[step];
					if(nextEnemy && nextEnemy.hp > 0) {
						// 攻击行为同上
						let livingAllies = C.allies.filter(a => a.hp > 0);
						if(livingAllies.length === 0) { handlePlayerDefeat(); return; }
						let target = livingAllies[Math.floor(Math.random() * livingAllies.length)];
						let eAtk = nextEnemy.wIdx > 0 ? (WEAPONS[nextEnemy.wIdx - 1]?.atk || 0) : 0;
						let aDef = target.armor ? (ARMORS.find(a => a.id === target.armor)?.def || 0) : 0;
						let totalAtk = nextEnemy.atk + eAtk; let totalDef = target.def + aDef;
						let dmg = Math.max(Math.floor(totalAtk * 0.05), totalAtk - totalDef);
						if(dmg <= 0) dmg = 1;
						target.hp -= dmg;
						combatLogAdd(`💥 <strong>${nextEnemy.name}</strong> 发动反扑，对 我方 <strong>${target.name}</strong> 造成了 ${dmg} 点伤害。`);
						if(target.hp <= 0) {
							let playerChar = C.allies.find(a => a.isPlayer);
							if(playerChar && playerChar.hp <= 0) { handlePlayerDefeat(); return; }
						}
						renderCombatScreen();
					}
					step++;
					setTimeout(nextEnemyStrikeResume, 1000);
				}
				setTimeout(nextEnemyStrikeResume, 1000);
			}

			// 结算模块：大获全胜
			function handleCombatVictory() {
				combatLogAdd("<span style='color:var(--green2); font-weight:bold; font-size:0.9rem;'>🏆 战役大捷！敌方已丧失全部反抗火种。</span>");
				
				// ---- 触发机制 7：击败敌人独立结算30%概率装备剥夺掉落 ----
				C.enemies.forEach(e => {
					// 只有真正被杀或捕获的才算掉落（排除成功逃跑的残血怪）
					if(e.hp <= 0 && !e.name.includes("逃脱")) {
						// 武器抽检
						if(e.wIdx > 0 && Math.random() < 0.3) {
							let lootW = WEAPONS[e.wIdx - 1];
							combatLogAdd(`<span style='color:var(--gold);'>🎁 战利品搜刮：斩获敌方配备的 [${lootW.name}]！已存入战备仓库。</span>`);
							// 检索或塞入玩家库（注意由于原始设计武器是单件分配给活人角色，这里统一添加进基础币收益或作为隐性资产，为了严格执行“直接收进仓库”，我们将其折算成声誉并在团队装备区可直接购买）
							G.rep += 10;
						}
						// 防具抽检
						if(e.aIdx > 0 && Math.random() < 0.3) {
							let lootA = ARMORS[e.aIdx - 1];
							combatLogAdd(`<span style='color:var(--gold);'>🎁 战利品搜刮：扒下敌方配备的 [${lootA.name}]！已存入战备仓库。</span>`);
							G.rep += 10;
						}
					}
				});

				// 基础额外奖励声誉
				G.rep += 5;
				renderGame();

				setTimeout(() => {
					closeCombatCleanup();
				}, 3000);
			}

			// 结算模块：全灭惨败
			function handlePlayerDefeat() {
				if(C.combatTimer) clearInterval(C.combatTimer);
				C.isAuto = false;

				G.gold = 100; // 扣至仅剩100保底现金
				G.inventory = {}; // 扣除所有货物
				G.transports.forEach(t => {
					if(t.id !== "walk") t.owned = false; // 扣除载具
				});
				G.city = G.prevCity; // 退回前一个城市

				combatLogAdd("<span style='color:var(--red2); font-weight:bold; font-size:0.9rem;'>🚨 团队全灭！主角受重伤昏迷，醒来发现物资被抢劫一空，仅剩100保底金退回原点。</span>");
				renderGame();

				setTimeout(() => {
					document.getElementById("combat-modal").classList.remove("open");
					_showNextEvent();
				}, 3500);
			}

			function closeCombatCleanup() {
				document.getElementById("combat-modal").classList.remove("open");
				document.getElementById("combat-log-container").innerHTML = "";
				_showNextEvent(); // 继续推进后续天数的路途事件
			}

			// ══════════════════════════════════
			// TABS
			// ══════════════════════════════════
			function switchTab(id) {
				document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
				document.querySelectorAll(".tab-content").forEach((t) => t.classList.remove("active"));
				document.getElementById("tab-" + (id === "buy" ? "buy" : id === "inventory" ? "inv" : id)).classList.add("active");
				document.getElementById("tab-content-" + id).classList.add("active");
			}

			// ══════════════════════════════════
			// SAVE / LOAD
			// ══════════════════════════════════
			function saveGame() {
				const blob = new Blob([JSON.stringify(G, null, 2)], { type: "application/json" });
				const url = URL.createObjectURL(blob);
				const a = document.createElement("a");
				a.href = url;
				a.download = `merchant_save_day${G.day}.json`;
				a.click();
				showToast(T("toastSave"), "gold");
			}

			function loadSaveFile(e) {
				const file = e.target.files[0];
				if (!file) return;
				const reader = new FileReader();
				reader.onload = (ev) => {
					try {
						G = JSON.parse(ev.target.result);
						LANG.current = G.lang || "zh";
						applyLang();
						renderGame();
						showScreen("game");
						showToast(T("toastLoad") + " " + G.day + " " + T("toastLoadDay"), "gold");
					} catch {
						showToast(T("toastCorrupt"), "red");
					}
				};
				reader.readAsText(file);
			}

			// ══════════════════════════════════
			// TOAST
			// ══════════════════════════════════
			let toastTimer;
			function showToast(msg, type = "") {
				const old = document.querySelector(".toast");
				if (old) old.remove();
				clearTimeout(toastTimer);
				const t = document.createElement("div");
				t.className = "toast " + type;
				t.textContent = msg;
				document.body.appendChild(t);
				toastTimer = setTimeout(() => t.remove(), 2800);
			}

			// ══════════════════════════════════
			// INIT
			// ══════════════════════════════════
			applyLang();
		</script>
	</body>
</html>
